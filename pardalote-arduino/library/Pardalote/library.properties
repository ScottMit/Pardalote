name=Pardalote
version=1.0.0
author=Scott Mitchell
maintainer=Scott Mitchell
sentence=Control Arduino hardware directly from a web browser over WiFi.
paragraph=Pardalote bridges Arduino and JavaScript over a binary WebSocket protocol. The Arduino-side library handles WiFi, the WebSocket server, board detection, and extension dispatch. Sketches reduce to Pardalote.begin() / Pardalote.run(). Extensions for Servo, NeoPixel, Ultrasonic, IMU, and ESP32 Camera are included as opt-in headers.
